name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      HAVE_CERT: ${{ secrets.MACOS_CERTIFICATE != '' && 'true' || '' }}
      HAVE_NOTARY: ${{ secrets.MACOS_NOTARY_KEY != '' && 'true' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtserialport'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Import signing certificate
        if: env.HAVE_CERT != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # macdeployqt must run BEFORE signing — it copies Qt frameworks into the
      # bundle, which would invalidate any earlier signature.
      - name: Bundle Qt dependencies (macdeployqt)
        run: macdeployqt build/SPE1KFAControl.app -always-overwrite

      # Sign everything recursively after macdeployqt has finished adding frameworks.
      # --options runtime enables Hardened Runtime, required for notarization.
      # entitlements.plist grants disable-library-validation so Qt plugins load.
      - name: Sign app bundle
        if: env.HAVE_CERT != ''
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --deep --force --verify --verbose \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist \
            build/SPE1KFAControl.app

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R build/SPE1KFAControl.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "SPE 1K-FA Control" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            SPE1KFAControl-macOS.dmg

      - name: Sign DMG
        if: env.HAVE_CERT != ''
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$MACOS_SIGNING_IDENTITY" SPE1KFAControl-macOS.dmg

      - name: Notarize DMG
        if: env.HAVE_NOTARY != ''
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          echo "$MACOS_NOTARY_KEY" > notary_key.p8
          xcrun notarytool submit SPE1KFAControl-macOS.dmg \
            --key notary_key.p8 \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER" \
            --wait
          rm notary_key.p8
          xcrun stapler staple SPE1KFAControl-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: SPE1KFAControl-macOS.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential \
            qt6-base-dev libqt6serialport6-dev \
            libgl1-mesa-dev libxcb-cursor0 libxkbcommon-x11-0

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (tarball)
        run: |
          mkdir -p dist
          cp build/SPE1KFAControl dist/
          tar -czf SPE1KFAControl-linux-x86_64.tar.gz -C dist SPE1KFAControl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: SPE1KFAControl-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtserialport'
          cache: true
          aqtversion: '==3.1.*'

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs (windeployqt)
        shell: cmd
        run: |
          windeployqt --release build\Release\SPE1KFAControl.exe

      - name: Package (zip)
        shell: pwsh
        run: |
          Compress-Archive -Path build\Release\* -DestinationPath SPE1KFAControl-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: SPE1KFAControl-windows-x64.zip

  release:
    name: Publish Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/SPE1KFAControl-macOS.dmg
            linux-tarball/SPE1KFAControl-linux-x86_64.tar.gz
            windows-zip/SPE1KFAControl-windows-x64.zip
          generate_release_notes: true
